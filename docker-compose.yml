# =============================================================================
# AI Software Factory — Docker Compose
# =============================================================================
# Prerequisites:
#   Create a .env file at this directory with the values shown in .env.example.
#   Then: docker compose up -d --build
# =============================================================================

name: ai-software-factory

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — required by the API config (currently in-memory store used;
  # DB-backed store pending.  Ready here so swapping is a config change only.)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-project}
    healthcheck:
      test:        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval:    10s
      timeout:     5s
      retries:     5
      start_period: 15s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # ---------------------------------------------------------------------------
  # Go API backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./src
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:             ${API_PORT:-8080}
      LOG_LEVEL:        ${LOG_LEVEL:-info}
      DB_HOST:          db
      DB_PORT:          ${POSTGRES_PORT:-5432}
      DB_USER:          ${POSTGRES_USER:-postgres}
      DB_PASSWORD:      ${POSTGRES_PASSWORD:-postgres}
      DB_NAME:          ${POSTGRES_DB:-project}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/healthz"]
      interval:    30s
      timeout:     5s
      retries:     3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Next.js frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8080/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval:    30s
      timeout:     5s
      retries:     3
      start_period: 15s

volumes:
  pgdata:
