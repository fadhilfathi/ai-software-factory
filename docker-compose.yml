# =============================================================================
# AI Software Factory — Docker Compose
# =============================================================================
# Prerequisites:
#   Create a .env file at this directory with the values shown in .env.example.
#   Then: docker compose up -d --build
# =============================================================================

name: ai-software-factory

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — required by the API config (currently in-memory store used;
  # DB-backed store pending.  Ready here so swapping is a config change only.)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-project}
    healthcheck:
      test:        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval:    10s
      timeout:     5s
      retries:     5
      start_period: 15s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # ---------------------------------------------------------------------------
  # Redis — used for refresh token store and rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test:        ["CMD", "redis-cli", "ping"]
      interval:    10s
      timeout:     5s
      retries:     5
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # ---------------------------------------------------------------------------
  # Go API backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./src
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT:             ${API_PORT:-8080}
      LOG_LEVEL:        ${LOG_LEVEL:-info}
      DB_HOST:          db
      DB_PORT:          ${POSTGRES_PORT:-5432}
      DB_USER:          ${POSTGRES_USER:-postgres}
      DB_PASSWORD:      ${POSTGRES_PASSWORD:-postgres}
      DB_NAME:          ${POSTGRES_DB:-project}
      REDIS_HOST:       redis
      REDIS_PORT:       ${REDIS_PORT:-6379}
      # TASK-430 (carryover): JWT secret signs and verifies JWTs.
      # PATH C AMENDMENT: a dev-only default is provided for non-prod
      # use (CI, local dev, integration tests). In production the
      # operator MUST override JWT_SECRET with a 32+ char random value
      # (see .env.example for the rotation pattern). The Go config
      # enforces min-length 32 and panics on shorter values.
      JWT_SECRET:       ${JWT_SECRET:-dev_only_secret_32_chars_minimum_for_local_testing}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      # Sprint 5: Aion Agent Runtime (TASK-501).
      # In-process mode is the default for Sprint 5 (security-01 C1
      # ENFORCED). Subprocess mode is gated behind AION_E2E=1 and is
      # reserved for CI integration tests (TASK-510).
      AION_BINARY:           ${AION_BINARY:-/usr/local/bin/aion}
      AION_MODEL:            ${AION_MODEL:-MiniMax-M3}
      AION_PROVIDER:         ${AION_PROVIDER:-aionrs}
      AION_PERMISSION_MODE:  ${AION_PERMISSION_MODE:-YOLO}
      AION_MAX_CONCURRENT:   ${AION_MAX_CONCURRENT:-4}
      AION_WAIT_TIMEOUT:     ${AION_WAIT_TIMEOUT:-300}
      AION_E2E:              ${AION_E2E:-0}
      # Sprint 5: Agent runtime mode (TASK-512 / security-01 C1).
      #   AGENT_RUNTIME         = aion is the only supported value in Sprint 5.
      #   AGENT_WORKER_SANDBOX  = in-process is ENFORCED (security-01 §0.5 C1).
      #   AGENT_WORKER_RESTART  = kill-in-flight = terminate in-flight
      #                           workers and start fresh on next dispatch.
      AGENT_RUNTIME:        ${AGENT_RUNTIME:-aion}
      AGENT_WORKER_SANDBOX: ${AGENT_WORKER_SANDBOX:-in-process}
      AGENT_WORKER_RESTART: ${AGENT_WORKER_RESTART:-kill-in-flight}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/healthz"]
      interval:    30s
      timeout:     5s
      retries:     3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Next.js frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8080/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval:    30s
      timeout:     5s
      retries:     3
      start_period: 15s

volumes:
  pgdata:
  redisdata:
