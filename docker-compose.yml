# =============================================================================
# AI Software Factory — Docker Compose
# =============================================================================
# Prerequisites:
#   Create a .env file at this directory with the values shown in .env.example.
#   Then: docker compose up -d --build
# =============================================================================

name: ai-software-factory

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — required by the API config (currently in-memory store used;
  # DB-backed store pending.  Ready here so swapping is a config change only.)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-project}
    healthcheck:
      test:        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval:    10s
      timeout:     5s
      retries:     5
      start_period: 15s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  # ---------------------------------------------------------------------------
  # Redis — used for refresh token store and rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test:        ["CMD", "redis-cli", "ping"]
      interval:    10s
      timeout:     5s
      retries:     5
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # ---------------------------------------------------------------------------
  # Go API backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./src
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # SERVER_PORT (not PORT) is read by src/internal/config/config.go:57.
      SERVER_PORT:      ${API_PORT:-8080}
      # JWT_SECRET is required at startup; panics if missing or < 32 chars.
      # Generate one with: openssl rand -hex 32 (64 hex chars; minimum is 32).
      JWT_SECRET:       "${JWT_SECRET:?error=JWT_SECRET must be set in .env (32+ chars; generate with: openssl rand -hex 32)}"
      LOG_LEVEL:        ${LOG_LEVEL:-info}
      DB_HOST:          db
      DB_PORT:          ${POSTGRES_PORT:-5432}
      DB_USER:          ${POSTGRES_USER:-postgres}
      DB_PASSWORD:      ${POSTGRES_PASSWORD:-postgres}
      DB_NAME:          ${POSTGRES_DB:-project}
      REDIS_HOST:       redis
      REDIS_PORT:       ${REDIS_PORT:-6379}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/healthz"]
      interval:    30s
      timeout:     5s
      retries:     3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Next.js frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8080/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval:    30s
      timeout:     5s
      retries:     3
      start_period: 15s

volumes:
  pgdata:
  redisdata:
