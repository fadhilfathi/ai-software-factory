# gitleaks configuration — TokenRouter MiniMax Factory
# Generated by Ops, 2026-06-14, as part of E-002 GitHub Protection.
# Blocks any commit containing: API keys, tokens, passwords, private keys,
# .env content, or other common secret patterns.

title = "TokenRouter MiniMax Factory — gitleaks config"

# Allow-list:
#  - example/test fixtures under src/backend/*/testdata/ and docs/
#  - .env.example (template, not real secrets)
[allowlist]
  description = "Test fixtures and example templates"
  paths = [
    '''.env.example''',
    '''docs/api-spec\.md$''',
    '''docs/architecture\.md$''',
    '''docs/reset/.*''',
    '''docs/sprint5/.*''',
    '''(\.git|node_modules|vendor|out|dist|build|tools/gitleaks\.zip)/.*''',
    '''.*testdata/.*''',
    '''.*_test\.go$''',
    '''.*\.test\.ts$''',
    '''.*\.spec\.ts$'''
  ]
  # Allow common placeholder tokens used in docs
  regexes = [
    '''(?i)(example|placeholder|dummy|fake|test|sample|xxx|your-?token|change-?me)'''
  ]
  stopwords = [
    '''placeholder''',
    '''example''',
    '''changeme''',
    '''dummy''',
    '''fake''',
    '''sample'''
  ]

# Use the built-in default ruleset as the baseline.
# This detects AWS, GitHub, GitLab, Slack, Stripe, OpenAI, Anthropic,
# Google API, JWT, RSA, generic API keys, and high-entropy strings.
[extend]
  useDefault = true
