name: secret-scan

# E-002 GitHub Protection — gitleaks pre-commit + push gate
# Owner: Ops.  Generated 2026-06-14.
# Blocks any PR or push to main that introduces a secret, API key,
# private key, or high-entropy string matching the gitleaks default
# ruleset + our custom .gitleaks.toml.

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**', 'sprint-*/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Required for gitleaks to scan full history (--log-opts).

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
        # Default behaviour:
        #   - on push: scans HEAD..HEAD (just the new commits)
        #   - on PR:   scans origin/${{ github.base_ref }}..HEAD
        # The action uploads a SARIF artifact and posts a PR summary
        # automatically on detection.

  # Defence-in-depth: fail the run if .gitleaks.toml is missing from
  # the working tree, so a future refactor can't silently disable
  # scanning.
  config-exists:
    name: config-exists
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify .gitleaks.toml present
        run: |
          if [ ! -f .gitleaks.toml ]; then
            echo "::error::.gitleaks.toml missing — secret scanning disabled."
            exit 1
          fi
          echo ".gitleaks.toml present, size=$(wc -c < .gitleaks.toml) bytes."
