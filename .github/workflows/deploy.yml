# =============================================================================
# Deploy Pipeline — AI Software Factory
# =============================================================================
# Runs on push to main AFTER CI passes (via branch protection or
# workflow_call). Builds production Docker images and deploys the stack.
#
# Current target: docker-compose on the runner itself (suitable for a
# single-VM deployment, CI demo, or staging env).
#
# For production deploys (Kubernetes, AWS ECS, etc.), add a deploy job
# that pushes images to a registry and updates the target orchestrator.
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # Build and push Docker images to GitHub Container Registry
  # ---------------------------------------------------------------------------
  docker:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- API image ---
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Frontend image ---
      - name: Build & push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy — update the running stack
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Stack
    needs: [docker]
    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: docker-compose.yml
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull fresh images
        run: |
          docker compose pull --quiet

      - name: Replace tag placeholders in compose file
        run: |
          sed -i "s|image:.*/api:.*|image: ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ env.IMAGE_TAG }}|g" docker-compose.yml 2>/dev/null || true
          sed -i "s|image:.*/frontend:.*|image: ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ env.IMAGE_TAG }}|g" docker-compose.yml 2>/dev/null || true

      - name: Deploy
        run: |
          docker compose up -d --remove-orphans

      - name: Health check after deploy
        run: |
          echo "Waiting for services to become healthy..."
          for i in $(seq 1 30); do
            all_healthy=true
            for svc in api frontend redis db; do
              id=$(docker compose ps -q "$svc" 2>/dev/null || true)
              if [ -z "$id" ]; then
                all_healthy=false
                break
              fi
              status=$(docker inspect --format='{{.State.Health.Status}}' "$id" 2>/dev/null)
              if [ "$status" != "healthy" ]; then
                all_healthy=false
                break
              fi
            done
            if $all_healthy; then
              break
            fi
            sleep 2
          done
          docker ps --format 'table {{.Names}}\t{{.Status}}'

      - name: Dump logs on failure
        if: failure()
        run: |
          for svc in db redis api frontend; do
            echo "=== $svc logs ==="
            docker compose logs --tail=50 "$svc"
          done

      - name: Rollback on health failure
        if: failure()
        run: |
          echo "❌ Health check failed — rolling back to previous images"
          docker compose up -d --remove-orphans 2>/dev/null || true
          # If rollback also fails, notify
          echo "⚠️  Rollback attempted — check docker compose ps"
          docker ps --format 'table {{.Names}}\t{{.Status}}'
